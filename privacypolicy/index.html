<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简·搜索 隐私政策</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Microsoft Yahei", sans-serif;
      background: #f9f9f9;
      color: #111;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    section {
      margin-bottom: 20px;
      line-height: 1.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>简·搜索 隐私政策</h1>
    <section>
      <p>我们不会收集你的搜索数据。你的搜索内容仅会与搜索建议提供商 Microsoft Bing 共享，因此数据仅用于搜索建议服务。</p>
    </section>
    <section>
      <p>如果你启用天气显示，位置信息会与 OpenWeatherMap 共享，用于获取本地天气信息。</p>
    </section>
    <section>
      <p>所有设置和数据均存储在本地，目前没有在线同步功能。</p>
    </section>
  </div>
  <div style="text-align:center; margin-top:1.5rem; color: var(--bs-secondary-color); font-size: 0.9rem;">
        简·搜索

    </div>
</body>
</html>
